<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20">
  <!-- The segment being measured -->
  <line x1="4" y1="7" x2="16" y2="7" stroke="#DEDEDE" stroke-width="2" stroke-linecap="round"/>
  <!-- Extension lines down -->
  <line x1="4"  y1="9"  x2="4"  y2="15" stroke="#DEDEDE" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="16" y1="9"  x2="16" y2="15" stroke="#DEDEDE" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Dimension line with arrows -->
  <line x1="4" y1="13" x2="16" y2="13" stroke="#DEDEDE" stroke-width="1.5" stroke-linecap="round"/>
  <polyline points="7,10.5 4,13 7,15.5"  fill="none" stroke="#DEDEDE" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
  <polyline points="13,10.5 16,13 13,15.5" fill="none" stroke="#DEDEDE" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
</svg>
